name: Apply final WebRadio 13.6.7 patch corrections

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v1367-final-patch-b64.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Append validated patch payload
        run: |
          echo '' | base64 -d >> .assistant/patch_webradio_v1367.py
          python3 -m py_compile .assistant/patch_webradio_v1367.py
          grep -q 'assert_selected_tab' .assistant/patch_webradio_v1367.py
          grep -q 'navController.popBackStack("vehicle_queue"' .assistant/patch_webradio_v1367.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_v1367.py
          git commit -m 'Finalize WebRadio 13.6.7 artist actions and tests'
          git pull --rebase origin main
          git push
