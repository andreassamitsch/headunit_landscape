name: Export WebRadio UI failure log

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-webradio-ui-log.yml'

permissions:
  actions: read
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Download and record log tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89049720846/logs" \
            -o /tmp/job.log
          mkdir -p _assistant
          tail -n 300 /tmp/job.log > _assistant/icy_metadata_build_failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/icy_metadata_build_failure.txt
          git commit -m 'Record ICY metadata build failure details [skip ci]'
          git push
