name: Record WebRadio 13.6.7 run

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/record-v1367-run.yml'

permissions:
  actions: read
  contents: write

jobs:
  record:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Record strict build run only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _assistant
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=50" \
            | jq '{workflow_runs: [.workflow_runs[] | select(.path == ".github/workflows/apply-webradio-v1367.yml")][0:5]}' \
            > _assistant/v1367_strict_runs.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/v1367_strict_runs.json
          git commit -m 'Record strict WebRadio 13.6.7 build status [skip ci]'
          git push

# explicit-route-refresh
