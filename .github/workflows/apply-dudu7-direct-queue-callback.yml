name: Apply direct Dudu7 queue callback

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-dudu7-direct-queue-callback.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Apply and verify
        run: |
          python3 scripts/apply_dudu7_direct_queue_callback.py
          python3 scripts/verify_dudu7_architecture.py
      - name: Commit implementation
        run: |
          rm -f scripts/apply_dudu7_direct_queue_callback.py
          rm -f .github/workflows/apply-dudu7-direct-queue-callback.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use direct Dudu7 queue return callback"
          git push
