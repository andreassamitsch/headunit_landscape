name: Sync MetroList Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: metrolist-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out maintained branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Merge official MetroList into review branch
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/MetrolistGroup/Metrolist.git 2>/dev/null || true
          git fetch upstream main
          git fetch origin main
          git checkout -B sync/metrolist-upstream origin/main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Der gepflegte Branch enthält bereits den aktuellen MetroList-Upstream."
            exit 0
          fi

          git merge --no-edit upstream/main
          git push --force-with-lease origin sync/metrolist-upstream
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or refresh upstream review PR
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          NUMBER="$(gh pr list \
            --base main \
            --head sync/metrolist-upstream \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          BODY=$(cat <<'EOF'
          ## Automatische MetroList-Aktualisierung

          Der offizielle `MetrolistGroup/Metrolist:main`-Stand wurde in einen Review-Branch übernommen.

          Die technische Prüfung erfolgt bewusst nur einmal über den normalen, kostensparenden Pull-Request-Check:

          - Dudu7-GMS-Build
          - Dudu7-Unit-Tests
          - strukturelle Dudu7-Architekturprüfung

          Der Pull Request wird **nicht automatisch zusammengeführt**. Änderungen an Player, Navigation, Innertube und Wiedergabe müssen vor dem Merge geprüft werden.
          EOF
          )

          if [ -z "$NUMBER" ]; then
            gh pr create \
              --base main \
              --head sync/metrolist-upstream \
              --title "MetroList-Upstream aktualisieren" \
              --body "$BODY"
          else
            gh pr edit "$NUMBER" --body "$BODY"
          fi
