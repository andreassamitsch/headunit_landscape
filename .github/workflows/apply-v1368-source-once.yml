name: Apply Metrolist 13.6.8 source once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v1368-source-once.yml'

permissions:
  contents: write

concurrency:
  group: apply-metrolist-v1368-source-once
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Reconstruct and verify source patch
        run: |
          set -euo pipefail
          cat .assistant/v1368_patch.part* > /tmp/v1368-source.patch.gz.b64
          echo '1fccaf960d4b8e9885a38afd688a332cfc2981611d9a781a6c90f3a80c6c73cf  /tmp/v1368-source.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/v1368-source.patch.gz.b64 > /tmp/v1368-source.patch.gz
          echo '8f0c8ce3c14b8fbfc815134efdfd41c571e253f6ad9860e96fac290e63d26ec0  /tmp/v1368-source.patch.gz' | sha256sum -c -
          gzip -dc /tmp/v1368-source.patch.gz > /tmp/v1368-source.patch
          echo 'bf50d85fb636c7d567e7e4e952d1c241bbe546effbdf0c15607a94f9f8573762  /tmp/v1368-source.patch' | sha256sum -c -
          git apply --check /tmp/v1368-source.patch

      - name: Apply and statically verify all nine changes
        run: |
          set -euo pipefail
          git apply /tmp/v1368-source.patch
          rm -f .assistant/v1368_patch.part*
          rm -f .github/workflows/apply-v1368-source-once.yml
          rm -f _assistant/export_source_run.json _assistant/export_source_artifacts.json
          python3 scripts/verify_dudu7_v1368_features.py
          python3 -m py_compile scripts/verify_dudu7_v1368_features.py
          bash -n scripts/dudu7_webradio_reliability_smoke.sh
          test "$(find .github/workflows -maxdepth 1 -type f | wc -l)" -eq 7
          grep -q 'versionCode = 157' app/build.gradle.kts
          grep -q 'versionName = "13.6.8"' app/build.gradle.kts

      - name: Commit integrated source without triggering builds
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Implement Metrolist Dudu7 13.6.8 features [skip ci]'
          git pull --rebase origin main
          git push
