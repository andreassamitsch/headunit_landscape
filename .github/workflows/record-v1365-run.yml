name: Record WebRadio 13.6.5 run

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/record-v1365-run.yml'

permissions:
  actions: read
  contents: write

jobs:
  record:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Record recent runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _assistant
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=10" \
            > _assistant/v1365_runs.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/v1365_runs.json
          git commit -m 'Record WebRadio 13.6.5 run status [skip ci]'
          git push

