name: Apply Dudu7 Player Refinement

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-dudu7-player-refinement.yml"

permissions:
  contents: write
  actions: write

concurrency:
  group: apply-dudu7-player-refinement
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Fix and apply the one-time migration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply_dudu7_player_refinement.py")
          text = path.read_text(encoding="utf-8")
          old = '''replace_once(
              queue_path,
              queue_header,
              """            if (!VehicleVariantConfig.isDudu7) {\\n${queue_header.replace(chr(10), chr(10) + '    ').rstrip()}\\n            }\\n""",
          )'''
          new = '''indented_queue_header = "\\n".join(
              ("    " + line) if line else line
              for line in queue_header.rstrip().splitlines()
          )
          replace_once(
              queue_path,
              queue_header,
              f"            if (!VehicleVariantConfig.isDudu7) {{\\n{indented_queue_header}\\n            }}\\n",
          )'''
          if old not in text:
              raise SystemExit("Expected queue migration block was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          python3 scripts/apply_dudu7_player_refinement.py
          git diff --check

      - name: Remove one-time inspection and migration files
        shell: bash
        run: |
          rm -f \
            .github/workflows/apply-dudu7-player-refinement.yml \
            .github/workflows/inspect-dudu7-source.yml \
            .build-metadata/dudu7-player-source.txt \
            scripts/apply_dudu7_player_refinement.py

      - name: Commit Dudu7 player UI
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Dudu7: refine player controls and queue"
          git push

      - name: Run visual Dudu7 UI test
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dudu7-ui-test.yml --ref main
