name: Quick Dudu7 Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_dudu7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Prepare
        run: |
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py
          keytool -genkeypair -v -keystore app/dudu7-debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Metrolist Dudu7 Test,O=Metrolist,C=AT"

      - name: Build
        run: ./gradlew --console=plain assembleGmsDudu7Debug --warning-mode summary -x lint
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music.test
          METROLIST_APP_NAME: Metrolist Dudu7 Test
          METROLIST_DEBUG_KEYSTORE_PATH: dudu7-debug.keystore
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Collect APK
        run: |
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" dist/Metrolist-Dudu7-Test.apk

      - uses: actions/upload-artifact@v6
        with:
          name: metrolist-dudu7-test-apk
          path: dist/Metrolist-Dudu7-Test.apk
          if-no-files-found: error
