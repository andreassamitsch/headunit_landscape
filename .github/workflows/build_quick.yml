name: Quick Test Build

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: read

jobs:
  build_quick:
    name: Quick GMS Debug Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Apply Dudu7 voice and playback fixes
        run: python3 scripts/apply_dudu7_fixes.py

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore persistent debug keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "DEBUG_KEYSTORE secret is missing"
            exit 1
          fi
          echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 --decode > app/persistent-debug.keystore
          test -s app/persistent-debug.keystore

      - name: Build installable GMS Debug APK (No Lint)
        run: ./gradlew --console=plain assembleGmsDebug --warning-mode summary -x lint -x lintGmsDebug
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music.test
          METROLIST_APP_NAME: Metrolist Dudu7 Test
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Upload installable APK
        uses: actions/upload-artifact@v6
        with:
          name: metrolist-dudu7-test-apk
          path: app/build/outputs/apk/gms/debug/*.apk
          if-no-files-found: error
