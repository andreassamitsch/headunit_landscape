name: Diagnose radio artist navigation support

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-radio-artist-search.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Locate YouTube artist search APIs and routes
        run: |
          set -euo pipefail
          mkdir -p _assistant
          {
            echo '=== YouTube search APIs ==='
            grep -RIn --include='*.kt' -E 'SearchFilter|FILTER_ARTIST|ArtistFilter|searchArtists|search\(' app innertube 2>/dev/null | head -n 1000 || true
            echo '=== artist item models and browse IDs ==='
            grep -RIn --include='*.kt' -E 'ArtistItem|artistId|browseId.*artist|artist.*browseId' app innertube 2>/dev/null | head -n 1000 || true
            echo '=== search result view models ==='
            grep -RIn --include='*.kt' -E 'class .*Search.*ViewModel|fun .*SearchResult|SearchResultScreen' app/src/main innertube 2>/dev/null | head -n 500 || true
          } > _assistant/radio_artist_search_diagnosis.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/radio_artist_search_diagnosis.txt
          git commit -m 'Record radio artist search diagnosis [skip ci]'
          git push
