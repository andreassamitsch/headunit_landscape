name: Migrate Dudu7 Layer

on:
  workflow_dispatch:
  push:
    branches: ["agent/dudu7-layer"]
    paths:
      - "scripts/migrate_dudu7_core_v2.py"
      - ".github/workflows/migrate-dudu7-layer.yml"

permissions:
  contents: write

jobs:
  migrate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/dudu7-layer
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - run: chmod +x gradlew

      - name: Align bootstrap with current source formatting
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("scripts/migrate_dudu7_core_v2.py")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '"                            expandedBound = maxHeight,\\n                        )\\n\\n                    val playerAwareWindowInsets ="',
                  '"                        expandedBound = maxHeight,\\n                    )\\n\\n                val playerAwareWindowInsets ="',
              ),
              (
                  "r'                    LaunchedEffect\\(playerConnection\\) \\{.*?\\n                    \\}\\n\\n                    DisposableEffect'",
                  "r'                LaunchedEffect\\(playerConnection\\) \\{.*?\\n                \\}\\n\\n                DisposableEffect'",
              ),
              (
                  '".weight(0.55f)\\n                            .fillMaxSize()"',
                  '".weight(0.55f)\\n                                .fillMaxSize()"',
              ),
              (
                  '"                        if (mediaMetadata != null) {\\n"\n    "                            controlsContent(mediaMetadata)\\n"',
                  '"                        val currentMediaMetadata = mediaMetadata\\n"\n    "                        if (currentMediaMetadata != null) {\\n"\n    "                            controlsContent(currentMediaMetadata)\\n"',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"Migration formatting anchor was not found: {old[:80]}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Materialize fixes and migrate architecture
        shell: bash
        run: |
          set +e
          python3 scripts/migrate_dudu7_core_v2.py > migration.log 2>&1
          STATUS=$?
          cat migration.log
          exit $STATUS

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-migration-diagnostics
          path: migration.log
          if-no-files-found: warn

      - name: Create migration debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/migration-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist Dudu7 Migration,O=Metrolist,C=AT"

      - name: Validate standard and Dudu7 variants
        shell: bash
        run: |
          set +e
          ./gradlew --console=plain \
            assembleFossStandardDebug :app:lintFossStandardDebug \
            assembleGmsDudu7Debug :app:lintGmsDudu7Debug \
            testGmsDudu7DebugUnitTest \
            --warning-mode summary > gradle-validation.log 2>&1
          STATUS=$?
          tail -n 240 gradle-validation.log
          exit $STATUS
        env:
          METROLIST_DEBUG_KEYSTORE_PATH: migration-debug.keystore
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-gradle-diagnostics
          path: gradle-validation.log
          if-no-files-found: warn

      - name: Collect validated Dudu7 APK
        shell: bash
        run: |
          mkdir -p dist
          find app/build/outputs/apk -type f -name '*.apk' -print
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep -Ei 'gms.*dudu7|dudu7.*gms' | head -n 1)"
          test -n "$APK"
          cp "$APK" dist/Metrolist-Dudu7-Migrated.apk

      - uses: actions/upload-artifact@v6
        with:
          name: metrolist-dudu7-migrated-apk
          path: dist/Metrolist-Dudu7-Migrated.apk
          if-no-files-found: error

      - name: Commit validated migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "architecture: materialize maintainable Dudu7 layer"
          git push origin HEAD:agent/dudu7-layer
