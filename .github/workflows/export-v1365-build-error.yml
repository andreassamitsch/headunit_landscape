name: Export WebRadio 13.6.5 compiler error

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-v1365-build-error.yml'

permissions:
  actions: read
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Export exact compiler error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _assistant
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89132747136/logs" \
            -o /tmp/log
          {
            grep -n -E '^.*(e: file|error:|Unresolved reference|Type mismatch|Compilation error|FAILURE:)' /tmp/log | tail -n 120 || true
            echo '--- tail ---'
            tail -n 120 /tmp/log
          } > _assistant/v1365_build_error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/v1365_build_error.txt
          git commit -m 'Record WebRadio 13.6.5 compiler error [skip ci]'
          git push
