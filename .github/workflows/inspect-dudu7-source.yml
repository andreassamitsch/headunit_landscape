name: Inspect Dudu7 Player Source

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/inspect-dudu7-source.yml"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Locate and capture relevant source
        shell: bash
        run: |
          mkdir -p .build-metadata
          OUT=.build-metadata/dudu7-player-source.txt
          : > "$OUT"

          for needle in \
            'fun ColumnScope.VehiclePlayerControls' \
            'fun VehicleLandscapeLayout' \
            'VehicleAction(' \
            'Your Queue'; do
            echo "===== SEARCH: $needle =====" >> "$OUT"
            grep -RIl --include='*.kt' --include='*.kts' "$needle" app/src 2>/dev/null | sort >> "$OUT" || true
            echo >> "$OUT"
          done

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "===== FILE: $file =====" >> "$OUT"
            cat "$file" >> "$OUT"
            echo >> "$OUT"
          done < <(
            grep -RIl --include='*.kt' \
              -e 'fun ColumnScope.VehiclePlayerControls' \
              -e 'fun VehicleLandscapeLayout' \
              app/src 2>/dev/null | sort -u
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git commit -m "Record Dudu7 player source locations [skip ci]"
          git push
