name: Inspect Dudu7 Player Source

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/inspect-dudu7-source.yml"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Locate and capture relevant source
        shell: bash
        run: |
          mkdir -p .build-metadata
          OUT=.build-metadata/dudu7-player-source.txt
          : > "$OUT"

          capture_matches() {
            local label="$1"
            local pattern="$2"
            shift 2
            echo "===== SEARCH: $label =====" >> "$OUT"
            grep -RIn -B 45 -A 90 "$@" -e "$pattern" app/src 2>/dev/null >> "$OUT" || true
            echo >> "$OUT"
          }

          capture_matches 'VehiclePlayerControls call sites' 'VehiclePlayerControls(' --include='*.kt'
          capture_matches 'VehicleLandscapeLayout call sites' 'VehicleLandscapeLayout(' --include='*.kt'
          capture_matches 'Queue header English' 'Your Queue' --include='*.kt' --include='*.xml'
          capture_matches 'Queue header resource' 'queue_title\|queue.*songs\|songs.*queue' --include='*.kt' --include='*.xml'
          capture_matches 'Cast UI' 'CAST_AVAILABLE\|castButton\|CastButton\|R.drawable.cast\|R.drawable.google_cast' --include='*.kt'
          capture_matches 'Shuffle state' 'shuffleModeEnabled' --include='*.kt'
          capture_matches 'Repeat state' 'repeatMode' --include='*.kt'

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUT"
          git commit -m "Record Dudu7 player call sites [skip ci]"
          git push
