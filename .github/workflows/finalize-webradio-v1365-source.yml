name: Finalize tested WebRadio 13.6.5 source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-webradio-v1365-source.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Apply the already tested source patch and commit normal source files
        run: |
          set -euxo pipefail
          git pull --rebase origin main
          python3 .assistant/patch_webradio_reliability_logos_cover.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/build.gradle.kts \
            app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt \
            app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt \
            app/src/main/kotlin/com/metrolist/music/radio/RadioBrowserClient.kt \
            app/src/main/kotlin/com/metrolist/music/radio/RadioStationLogoResolver.kt \
            app/src/main/kotlin/com/metrolist/music/ui/screens/radio/WebRadioScreen.kt \
            scripts/icy_test_server.py \
            scripts/dudu7_webradio_reliability_smoke.sh
          git commit -m 'Harden WebRadio playback and improve station artwork'
          git push
