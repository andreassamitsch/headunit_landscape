name: Apply Dudu7 RVX layout

on:
  push:
    branches:
      - agent/dudu7-rvx-player-layout
    paths:
      - tools/apply_dudu7_rvx_layout.py
      - .github/workflows/apply_dudu7_rvx_layout.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/dudu7-rvx-player-layout
          fetch-depth: 0
      - name: Apply patch
        run: python3 tools/apply_dudu7_rvx_layout.py
      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply_dudu7_rvx_layout.py .github/workflows/apply_dudu7_rvx_layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement Dudu7 RVX split player layout"
          git push origin HEAD:agent/dudu7-rvx-player-layout
