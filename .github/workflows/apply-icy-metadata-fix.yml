name: Apply ICY metadata fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-icy-metadata-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    env:
      METROLIST_APP_NAME: Metrolist
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Apply ICY metadata output patch
        run: python3 .assistant/patch_icy_metadata.py
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build ARM Dudu7 APK
        run: ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary
      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          git rm -f .assistant/patch_icy_metadata.py .github/workflows/apply-icy-metadata-fix.yml
          git commit -m 'Handle timed ICY metadata for WebRadio'
          git push
