name: Apply ICY metadata fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-icy-metadata-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    env:
      METROLIST_APP_NAME: Metrolist
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Record fix run
        run: |
          mkdir -p _assistant
          printf '%s\n' "$GITHUB_RUN_ID" > _assistant/icy_fix_run.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/icy_fix_run.txt
          git commit -m "Record ICY fix run $GITHUB_RUN_ID [skip ci]" || true
          git push || true

      - name: Apply timed metadata patch
        run: python3 .assistant/patch_icy_metadata.py

      - name: Verify patch structure
        run: |
          set -euxo pipefail
          grep -q 'override fun onMetadata(metadata: Metadata)' app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          grep -q 'getFirstEntryOfType(IcyInfo::class.java)' app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          ! grep -q 'MetadataOutput' app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          ! grep -q 'addMetadataOutput' app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          grep -q 'versionCode = 152' app/build.gradle.kts
          grep -q 'versionName = "13.6.3"' app/build.gradle.kts

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build ARM Dudu7 APK
        run: ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary

      - name: Collect and verify APK
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" artifacts/Metrolist-Dudu7-WebRadio-13.6.3.apk
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/aapt" dump badging artifacts/Metrolist-Dudu7-WebRadio-13.6.3.apk | tee artifacts/apk-badging.txt
          "$build_tools/apksigner" verify --verbose --print-certs artifacts/Metrolist-Dudu7-WebRadio-13.6.3.apk | tee artifacts/apk-signature.txt
          grep -q "package: name='com.metrolist.music.dudu7.debug' versionCode='152'" artifacts/apk-badging.txt
          sha256sum artifacts/Metrolist-Dudu7-WebRadio-13.6.3.apk | tee artifacts/SHA256SUMS.txt

      - name: Commit verified fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/build.gradle.kts app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt
          git rm -f .assistant/patch_icy_metadata.py .github/workflows/apply-icy-metadata-fix.yml
          git commit -m 'Handle timed ICY metadata for WebRadio'
          git push

      - name: Upload verified APK
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Dudu7-WebRadio-13.6.3-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
