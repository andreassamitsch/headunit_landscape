name: Manual Metrolist 13.6.7 APK build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-metrolist-v1367-apk
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply tested WebRadio 13.6.7 sources
        run: |
          python3 .assistant/patch_webradio_v1367.py
          python3 .assistant/route_embedded_artist_screen.py
          python3 .assistant/normalize_webradio_v1367_artist_source.py
          python3 .assistant/harden_webradio_v1367_validation.py
          python3 .assistant/force_webradio_artist_pointer_actions.py
          grep -q 'versionCode = 156' app/build.gradle.kts
          grep -q 'versionName = "13.6.7"' app/build.gradle.kts
          grep -q 'EmbeddedArtistScreen(navController)' app/src/main/kotlin/com/metrolist/music/ui/screens/NavigationBuilder.kt
          test -f app/src/main/kotlin/com/metrolist/music/ui/screens/artist/EmbeddedArtistScreen.kt
          chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Build ARM update APK
        run: ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Verify and package APK
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" artifacts/Metrolist-Dudu7-13.6.7.apk
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/aapt" dump badging artifacts/Metrolist-Dudu7-13.6.7.apk | tee artifacts/apk-badging.txt
          "$build_tools/apksigner" verify --verbose --print-certs artifacts/Metrolist-Dudu7-13.6.7.apk | tee artifacts/apk-signature.txt
          grep -q "package: name='com.metrolist.music.dudu7.debug' versionCode='156'" artifacts/apk-badging.txt
          unzip -l artifacts/Metrolist-Dudu7-13.6.7.apk | grep -E 'lib/(arm64-v8a|armeabi-v7a)/'
          sha256sum artifacts/Metrolist-Dudu7-13.6.7.apk | tee artifacts/SHA256SUMS.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Dudu7-13.6.7-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
