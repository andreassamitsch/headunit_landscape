name: Trigger Final Dudu7 UI Test

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/trigger-final-dudu7-ui-test.yml"

permissions:
  contents: write
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Remove trigger before dispatch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/trigger-final-dudu7-ui-test.yml
          git commit -m "Remove final Dudu7 UI test trigger [skip ci]"
          git push

      - name: Dispatch visual test
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dudu7-ui-test.yml --ref main
