name: Materialize Dudu7 on MetroList 13.6.1

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-upstream-dudu7
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Assemble readable migration script
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/rebuild_*.py.part > /tmp/rebuild_dudu7_on_upstream.py
          python3 -m py_compile /tmp/rebuild_dudu7_on_upstream.py
          sha256sum /tmp/rebuild_dudu7_on_upstream.py

      - name: Materialize on pinned official upstream
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/MetrolistGroup/Metrolist.git 2>/dev/null || true
          git fetch upstream main
          git fetch origin c103e0fc4278e5fa9343938325b96483b6308627
          UPSTREAM_SHA="f0f91e4f7a7fa09fb3050dfe1d495e4c86542a99"
          test "$(git rev-parse upstream/main)" = "$UPSTREAM_SHA"
          git checkout -B agent/upstream-13.6.1-dudu7 "$UPSTREAM_SHA"
          python3 /tmp/rebuild_dudu7_on_upstream.py \
            --source-ref c103e0fc4278e5fa9343938325b96483b6308627 \
            --upstream-sha "$UPSTREAM_SHA" 2>&1 | tee /tmp/migration-materialize.log
          git submodule sync --recursive
          git submodule update --init --recursive
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py

      - name: Build and validate standard and Dudu7
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --console=plain \
            assembleFossStandardDebug :app:lintFossStandardDebug \
            assembleGmsDudu7Debug :app:lintGmsDudu7Debug \
            testGmsDudu7DebugUnitTest \
            --tests "com.metrolist.music.variant.Dudu7LayoutTest" \
            --warning-mode summary 2>&1 | tee migration-build.log
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Dudu7
          METROLIST_DEBUG_KEYSTORE_PATH: keystore/dudu7-debug.keystore
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Commit and push validated branch
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git add -f app/keystore/dudu7-debug.keystore
          git commit -m "Dudu7: Overlay auf MetroList 13.6.1"
          git push --force origin agent/upstream-13.6.1-dudu7

      - name: Collect Dudu7 APK
        shell: bash
        run: |
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" dist/Metrolist-Dudu7-13.6.1.apk

      - name: Upload result and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-upstream-13.6.1-result
          path: |
            /tmp/migration-materialize.log
            migration-build.log
            dist/Metrolist-Dudu7-13.6.1.apk
          if-no-files-found: warn
