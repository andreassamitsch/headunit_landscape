name: Materialize Dudu7 on MetroList 13.6.1

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-upstream-dudu7
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/upstream-13.6.1-bootstrap-final'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Assemble readable migration script
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/rebuild_*.py.part > /tmp/rebuild_dudu7_on_upstream.py
          python3 -m py_compile /tmp/rebuild_dudu7_on_upstream.py

      - name: Materialize previously validated source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/MetrolistGroup/Metrolist.git 2>/dev/null || true
          git fetch upstream main
          git fetch origin main
          git fetch origin c103e0fc4278e5fa9343938325b96483b6308627
          UPSTREAM_SHA="f0f91e4f7a7fa09fb3050dfe1d495e4c86542a99"
          test "$(git rev-parse upstream/main)" = "$UPSTREAM_SHA"
          git checkout -B agent/upstream-13.6.1-dudu7 "$UPSTREAM_SHA"
          python3 /tmp/rebuild_dudu7_on_upstream.py \
            --source-ref c103e0fc4278e5fa9343938325b96483b6308627 \
            --upstream-sha "$UPSTREAM_SHA" 2>&1 | tee /tmp/migration-materialize.log
          git submodule sync --recursive
          git submodule update --init --recursive
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py

      - name: Publish as one content commit on current main
        shell: bash
        run: |
          set -euo pipefail
          # Preserve the current repository workflows exactly. The app/source tree is
          # the already validated MetroList 13.6.1 + Dudu7 content.
          rm -rf .github/workflows
          git checkout origin/main -- .github/workflows
          git add -A
          git add -f app/keystore/dudu7-debug.keystore
          TREE="$(git write-tree)"
          BASE="$(git rev-parse origin/main)"
          COMMIT="$(printf '%s\n' 'Dudu7: MetroList 13.6.1 als aktuelle Basis [skip ci]' | git commit-tree "$TREE" -p "$BASE")"
          git update-ref refs/heads/agent/upstream-13.6.1-dudu7 "$COMMIT"
          git push --force origin refs/heads/agent/upstream-13.6.1-dudu7
          echo "$COMMIT" | tee /tmp/published-commit.txt

      - name: Upload publication diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-upstream-13.6.1-publication
          path: |
            /tmp/migration-materialize.log
            /tmp/published-commit.txt
          if-no-files-found: warn
