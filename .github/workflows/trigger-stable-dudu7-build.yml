name: Trigger Stable Dudu7 Build

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/trigger-stable-dudu7-build.yml"

permissions:
  contents: write
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Remove trigger before dispatch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/trigger-stable-dudu7-build.yml
          git commit -m "Remove stable Dudu7 build trigger [skip ci]"
          git push

      - name: Dispatch build
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build.yml --ref main
