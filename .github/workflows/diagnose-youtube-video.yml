name: Diagnose YouTube Music Video

on:
  push:
    branches: ["agent/diagnose-Cx7QOJLFnug"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yt-dlp
        run: python3 -m pip install --upgrade yt-dlp

      - name: Compare target and control video
        continue-on-error: true
        shell: bash
        run: |
          : > diagnosis.txt
          for VIDEO_ID in Cx7QOJLFnug dQw4w9WgXcQ; do
            VIDEO_URL="https://www.youtube.com/watch?v=$VIDEO_ID"
            echo "===== VIDEO: $VIDEO_ID =====" >> diagnosis.txt
            for CLIENT in default web_music android ios; do
              echo "--- CLIENT: $CLIENT ---" >> diagnosis.txt
              if [ "$CLIENT" = "default" ]; then
                yt-dlp -v --simulate --print "id=%(id)s title=%(title)s availability=%(availability)s age=%(age_limit)s selected=%(format_id)s %(ext)s %(protocol)s %(acodec)s %(vcodec)s" "$VIDEO_URL" >> diagnosis.txt 2>&1 || true
              else
                yt-dlp -v --simulate --extractor-args "youtube:player_client=$CLIENT" --print "id=%(id)s title=%(title)s availability=%(availability)s age=%(age_limit)s selected=%(format_id)s %(ext)s %(protocol)s %(acodec)s %(vcodec)s" "$VIDEO_URL" >> diagnosis.txt 2>&1 || true
              fi
            done
            echo >> diagnosis.txt
          done

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: youtube-diagnosis-Cx7QOJLFnug
          path: diagnosis.txt
          if-no-files-found: error
