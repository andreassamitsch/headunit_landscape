name: Diagnose YouTube Music Video

on:
  push:
    branches: ["agent/diagnose-Cx7QOJLFnug"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yt-dlp
        run: python3 -m pip install --upgrade yt-dlp

      - name: Inspect video with multiple YouTube clients
        continue-on-error: true
        shell: bash
        run: |
          VIDEO_URL="https://www.youtube.com/watch?v=Cx7QOJLFnug"
          : > diagnosis.txt

          echo "===== BASIC METADATA =====" >> diagnosis.txt
          yt-dlp --no-warnings --simulate \
            --print "id=%(id)s" \
            --print "title=%(title)s" \
            --print "uploader=%(uploader)s" \
            --print "availability=%(availability)s" \
            --print "age_limit=%(age_limit)s" \
            --print "live_status=%(live_status)s" \
            --print "duration=%(duration)s" \
            "$VIDEO_URL" >> diagnosis.txt 2>&1 || true

          for CLIENT in default web web_music android ios tv; do
            echo >> diagnosis.txt
            echo "===== CLIENT: $CLIENT =====" >> diagnosis.txt
            if [ "$CLIENT" = "default" ]; then
              yt-dlp -v --simulate --print "selected_format=%(format_id)s %(ext)s %(protocol)s %(acodec)s %(vcodec)s" "$VIDEO_URL" >> diagnosis.txt 2>&1 || true
            else
              yt-dlp -v --simulate --extractor-args "youtube:player_client=$CLIENT" --print "selected_format=%(format_id)s %(ext)s %(protocol)s %(acodec)s %(vcodec)s" "$VIDEO_URL" >> diagnosis.txt 2>&1 || true
            fi
          done

          echo >> diagnosis.txt
          echo "===== FORMATS =====" >> diagnosis.txt
          yt-dlp -F "$VIDEO_URL" >> diagnosis.txt 2>&1 || true

      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: youtube-diagnosis-Cx7QOJLFnug
          path: diagnosis.txt
          if-no-files-found: error
