name: Apply Dudu7 queue return channel fix

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-dudu7-queue-return-channel-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply and verify patch
        run: |
          python3 scripts/apply_dudu7_queue_return_channel_fix.py
          python3 scripts/verify_dudu7_architecture.py

      - name: Commit implementation
        run: |
          rm -f scripts/apply_dudu7_queue_return_channel_fix.py
          rm -f .github/workflows/apply-dudu7-queue-return-channel-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Guarantee Dudu7 queue return after title selection"
          git push
