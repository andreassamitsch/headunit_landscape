name: Fix WebRadio 13.6.7 pane width capture

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1367-pane-width.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture BoxWithConstraints width before nested lazy scopes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.assistant/patch_webradio_v1367.py')
          text = path.read_text(encoding='utf-8')
          old_box = '''    BoxWithConstraints(
        modifier = Modifier.fillMaxSize(),
    ) {'''
          new_box = '''    BoxWithConstraints(
        modifier = Modifier.fillMaxSize(),
    ) {
        val embeddedPaneWidth = maxWidth'''
          if old_box not in text:
              raise SystemExit('Expected generated BoxWithConstraints block not found')
          text = text.replace(old_box, new_box, 1)
          old_width = '(maxWidth / artistHeaderAspectRatio -'
          new_width = '(embeddedPaneWidth / artistHeaderAspectRatio -'
          if old_width not in text:
              raise SystemExit('Expected generated maxWidth calculation not found')
          text = text.replace(old_width, new_width, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_v1367.py
          git commit -m 'Fix embedded artist pane width capture'
          git pull --rebase origin main
          git push
