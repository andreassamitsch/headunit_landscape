name: Record Dudu7 UI Runs

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/record-dudu7-ui-runs.yml"

permissions:
  actions: read
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Record recent UI runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .build-metadata
          gh api repos/${{ github.repository }}/actions/workflows/dudu7-ui-test.yml/runs?per_page=5 \
            --jq '{workflow_runs: [.workflow_runs[] | {id, status, conclusion, event, head_sha, created_at}]}' \
            > .build-metadata/dudu7-ui-runs.json
          rm .github/workflows/record-dudu7-ui-runs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh recent Dudu7 UI runs [skip ci]"
          git push
