name: Fix WebRadio 13.6.5 test seed patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1365-seed-patch.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Correct station seed indentation and retrigger main validation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          patch = Path('.assistant/patch_webradio_reliability_logos_cover.py')
          text = patch.read_text(encoding='utf-8')
          replacements = [
              ("'''  {\"uuid\":\"test-radio-one\"", "''' {\"uuid\":\"test-radio-one\""),
              ('\n  {"uuid":"test-radio-two"', '\n {"uuid":"test-radio-two"'),
              ('\n  {"uuid":"test-radio-three"', '\n {"uuid":"test-radio-three"'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Missing patch text: {old}')
              text = text.replace(old, new)
          patch.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-webradio-reliability-v1365.yml')
          wf = workflow.read_text(encoding='utf-8')
          marker = '# corrected-seed-patch-v2\n'
          if marker not in wf:
              wf += '\n' + marker
          workflow.write_text(wf, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_reliability_logos_cover.py .github/workflows/apply-webradio-reliability-v1365.yml
          git commit -m 'Fix 13.6.5 reliability test station seeds'
          git pull --rebase origin main
          git push
