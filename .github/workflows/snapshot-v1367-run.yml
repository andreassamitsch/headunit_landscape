name: Snapshot Metrolist 13.6.7 APK build

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/snapshot-v1367-run.yml'

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-slim
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest APK build and jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _assistant
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/apply-webradio-v1367.yml/runs?branch=main&per_page=1" \
            > _assistant/v1367_final_apk_run.json
          run_id="$(python3 - <<'PY'
          import json
          data=json.load(open('_assistant/v1367_final_apk_run.json', encoding='utf-8'))
          print(data['workflow_runs'][0]['id'])
          PY
          )"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
            > _assistant/v1367_final_apk_jobs.json
      - name: Commit snapshot
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add _assistant/v1367_final_apk_run.json _assistant/v1367_final_apk_jobs.json
          git commit -m 'Snapshot final Metrolist APK build [skip ci]' || exit 0
          git pull --rebase origin main
          git push

