name: Fix Metrolist 13.6.8 compile imports once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1368-compile-imports-once.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply the two compiler import corrections
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          artist = Path('app/src/main/kotlin/com/metrolist/music/ui/screens/artist/ArtistItemsScreen.kt')
          text = artist.read_text(encoding='utf-8')
          if 'import kotlinx.coroutines.launch\n' not in text:
              marker = 'import com.metrolist.music.viewmodels.ArtistItemsViewModel\n'
              if marker not in text:
                  raise SystemExit('ArtistItemsScreen import marker missing')
              text = text.replace(marker, marker + 'import kotlinx.coroutines.launch\n', 1)
              artist.write_text(text, encoding='utf-8')

          radio = Path('app/src/main/kotlin/com/metrolist/music/ui/screens/radio/WebRadioScreen.kt')
          text = radio.read_text(encoding='utf-8')
          bad = 'import sh.calvin.reorderable.longPressDraggableHandle\n'
          if bad not in text:
              raise SystemExit('WebRadioScreen obsolete import missing')
          radio.write_text(text.replace(bad, '', 1), encoding='utf-8')
          PY
          grep -q '^import kotlinx.coroutines.launch$' app/src/main/kotlin/com/metrolist/music/ui/screens/artist/ArtistItemsScreen.kt
          ! grep -q '^import sh.calvin.reorderable.longPressDraggableHandle$' app/src/main/kotlin/com/metrolist/music/ui/screens/radio/WebRadioScreen.kt
          rm -f .github/workflows/fix-v1368-compile-imports-once.yml
      - name: Commit correction and self-delete
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix Metrolist 13.6.8 compiler imports [skip ci]'
          git pull --rebase origin main
          git push
