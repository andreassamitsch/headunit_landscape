name: Diagnose WebRadio tab and logo

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-webradio-tab-logo.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Probe Antenne Steiermark logo sources
        run: |
          set -u
          mkdir -p _assistant /tmp/antenne
          OUT=_assistant/webradio_tab_logo_diagnosis.txt
          : > "$OUT"
          echo '=== Radio Browser search ===' >> "$OUT"
          curl -A 'MetrolistHU/13.6.5 logo probe' -L --max-time 30 -sS -G \
            --data-urlencode 'name=Antenne Steiermark' \
            --data 'hidebroken=true' --data 'limit=30' --data 'order=clickcount' --data 'reverse=true' \
            'https://de1.api.radio-browser.info/json/stations/search' \
            -o /tmp/antenne/rb.json || true
          if test -s /tmp/antenne/rb.json; then
            jq -c '.[] | {stationuuid,name,homepage,favicon,url_resolved,lastcheckok,clickcount}' /tmp/antenne/rb.json >> "$OUT" || cat /tmp/antenne/rb.json >> "$OUT"
          else
            echo 'Radio Browser returned no data' >> "$OUT"
          fi
          echo '=== Website metadata ===' >> "$OUT"
          for url in \
            'https://www.antenne.at/' \
            'https://www.antenne.at/steiermark/' \
            'https://steiermark.antenne.at/' \
            'https://www.antenne.at/radioplayercontent/steiermark/'
          do
            echo "--- $url ---" >> "$OUT"
            curl -A 'MetrolistHU/13.6.5 logo probe' -L --max-time 30 -sS -D /tmp/antenne/headers -o /tmp/antenne/page "$url" || true
            tail -n 1 /tmp/antenne/headers >> "$OUT" || true
            grep -Eio '<(meta|link)[^>]+(icon|manifest|og:image|twitter:image)[^>]*>' /tmp/antenne/page | head -n 100 >> "$OUT" || true
            grep -Eo 'https?://[^"<> ]+' /tmp/antenne/page | grep -Ei '(logo|icon|favicon|antenne)' | head -n 100 >> "$OUT" || true
          done
          echo '=== Common icon paths ===' >> "$OUT"
          for base in 'https://www.antenne.at' 'https://steiermark.antenne.at'; do
            for path in '/favicon.ico' '/favicon.png' '/apple-touch-icon.png' '/android-chrome-192x192.png' '/android-chrome-512x512.png' '/site.webmanifest' '/manifest.json'; do
              result=$(curl -A 'MetrolistHU/13.6.5 logo probe' -L --max-time 20 -sS -o /tmp/antenne/icon -w '%{http_code} %{url_effective} %{content_type} %{size_download}' "$base$path" || true)
              echo "$base$path => $result" >> "$OUT"
              if [[ "$path" == *.json || "$path" == *.webmanifest ]]; then head -c 2000 /tmp/antenne/icon >> "$OUT" 2>/dev/null || true; echo >> "$OUT"; fi
            done
          done
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f "$OUT"
          git commit -m 'Record simple Antenne Steiermark logo probe [skip ci]' || true
          git pull --rebase origin main || true
          git push || true
