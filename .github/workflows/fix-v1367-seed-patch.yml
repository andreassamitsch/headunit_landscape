name: Fix WebRadio 13.6.7 station seed patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1367-seed-patch.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Match the existing one-space JSON seed indentation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('.assistant/patch_webradio_v1367.py')
          text=path.read_text(encoding='utf-8')
          before=text
          text=text.replace("'''  {\"uuid\":", "''' {\"uuid\":")
          text=text.replace("\n  {\"uuid\":", "\n {\"uuid\":")
          if text == before:
              raise SystemExit('No station seed indentation was changed')
          path.write_text(text,encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_v1367.py
          git commit -m 'Fix 13.6.7 station seed patch indentation'
          git pull --rebase origin main
          git push
