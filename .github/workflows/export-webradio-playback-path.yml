name: Export WebRadio playback path

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-webradio-playback-path.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - name: Export relevant source regions
        run: |
          set -euo pipefail
          OUT=_assistant/webradio_playback_path.txt
          mkdir -p _assistant
          {
            echo '=== MATCHES ==='
            grep -RIn --include='*.kt' -E 'fun playQueue|setMediaItems|setMediaItem|createMediaSourceFactory|ResolvingDataSource|isRadioMediaId|onPlayerError|triggerRetry|stopOnError|prepare\(\)' app/src/main/kotlin/com/metrolist/music/playback | head -n 2000 || true
            echo
            echo '=== MUSIC SERVICE CONTEXTS ==='
            FILE=app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt
            for pat in 'fun playQueue' 'createMediaSourceFactory' 'ResolvingDataSource' 'onPlayerError' 'triggerRetry' 'stopOnError'; do
              echo "--- $pat ---"
              line=$(grep -n "$pat" "$FILE" | head -n1 | cut -d: -f1 || true)
              if [[ -n "$line" ]]; then
                start=$(( line > 100 ? line - 100 : 1 ))
                end=$(( line + 220 ))
                sed -n "${start},${end}p" "$FILE"
              fi
            done
            echo
            echo '=== QUEUE IMPLEMENTATIONS ==='
            find app/src/main/kotlin/com/metrolist/music/playback/queues -type f -name '*.kt' -maxdepth 2 -print -exec sed -n '1,260p' {} \;
          } > "$OUT"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f "$OUT"
          git commit -m 'Record WebRadio playback path diagnosis [skip ci]'
          git push
