name: Record recent history fix runs

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/record-recent-runs-history-fix.yml"

permissions:
  actions: read
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Record recent workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .build-metadata
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?per_page=15" \
            --jq '{workflow_runs: [.workflow_runs[] | {id, name, status, conclusion, event, head_sha, created_at}]}' \
            > .build-metadata/recent-history-fix-runs.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-metadata/recent-history-fix-runs.json
          git commit -m "Record recent history fix runs [skip ci]"
          git push
