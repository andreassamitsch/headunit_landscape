name: Fix WebRadio 13.6.7 artist navigation order

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v1367-artist-navigation-order.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Append navigation-order correction
        run: |
          echo '' | base64 -d >> .assistant/patch_webradio_v1367.py
          python3 -m py_compile .assistant/patch_webradio_v1367.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_v1367.py
          git commit -m 'Navigate before embedded artist queue preparation'
          git pull --rebase origin main
          git push
