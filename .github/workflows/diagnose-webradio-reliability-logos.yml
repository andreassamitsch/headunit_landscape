name: Diagnose WebRadio reliability and logos

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-webradio-reliability-logos.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Inspect Metrolist and Transistor sources
        run: |
          set -euo pipefail
          mkdir -p _assistant
          OUT=_assistant/webradio_reliability_logo_diagnosis.txt
          {
            echo '=== CURRENT COMMIT ==='
            git rev-parse HEAD
            echo
            echo '=== RADIO REFERENCES ==='
            grep -RIn --include='*.kt' -E 'isRadioMediaId|radio_stream_url|toRadioStationOrNull|playQueue\(|setMediaItems|currentMediaItem|thumbnailUrl|lookupRadioCover|YouTube.search' app/src/main/kotlin/com/metrolist/music/playback app/src/main/kotlin/com/metrolist/music/radio app/src/main/kotlin/com/metrolist/music/ui/screens/radio app/src/main/kotlin/com/metrolist/music/ui/player | head -n 1200 || true
            echo
            echo '=== MUSIC SERVICE PLAY QUEUE / RESOLVER ==='
            grep -RIn --include='*.kt' -E 'fun playQueue|suspend fun playQueue|setMediaItems|resolve|PlaybackException|onPlayerError|mediaSource|DataSource|Radio' app/src/main/kotlin/com/metrolist/music/playback | head -n 1200 || true
            echo
            echo '=== RADIO COVER / THUMBNAIL UTILITIES ==='
            grep -RIn --include='*.kt' -E 'thumbnail.*(size|width|height|url)|maxres|w[0-9]{2,4}|h[0-9]{2,4}|ImageRequest|AsyncImage|ContentScale' app/src/main/kotlin | head -n 1000 || true
            echo
            echo '=== CURRENT RADIO FILES ==='
            for f in \
              app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt \
              app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt \
              app/src/main/kotlin/com/metrolist/music/radio/RadioStation.kt \
              app/src/main/kotlin/com/metrolist/music/radio/RadioBrowserClient.kt \
              app/src/main/kotlin/com/metrolist/music/ui/screens/radio/WebRadioScreen.kt; do
              echo "--- $f ---"
              sed -n '1,1200p' "$f" 2>/dev/null || true
            done
            echo
            echo '=== TRANSISTOR SOURCE ==='
            if git clone --depth 1 https://codeberg.org/y20k/transistor.git /tmp/transistor; then
              cd /tmp/transistor
              git rev-parse HEAD
              echo '-- logo/image/artwork references --'
              grep -RIn --include='*.kt' --include='*.java' -E 'favicon|station.*image|image.*station|artwork|logo|RadioBrowser|stationuuid' . | head -n 1200 || true
              echo '-- candidate files --'
              find . -type f \( -name '*.kt' -o -name '*.java' \) | grep -Ei 'station|image|artwork|radio' | head -n 300 || true
            else
              echo 'Transistor clone failed'
            fi
          } > "$OUT" 2>&1

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f "$OUT"
          git commit -m 'Record WebRadio reliability and logo diagnosis [skip ci]'
          git push
