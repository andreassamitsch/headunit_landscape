name: Extend Dudu7 Navigation Test

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/extend-dudu7-navigation-test.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Extend smoke test
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/dudu7_ui_smoke.sh")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "adb shell screenrecord --time-limit 30 /sdcard/dudu7-ui-smoke.mp4",
              "adb shell screenrecord --time-limit 60 /sdcard/dudu7-ui-smoke.mp4",
              1,
          )
          old = '''find_and_tap "library tab" "=Bibliothek" "=Library" && capture "library" || true
          find_and_tap "search tab" "=Suche" "=Search" && capture "search" || true
          find_and_tap "history tab" "=Hörverlauf" "=History" && capture "history" || true
          find_and_tap "home tab" "=Startseite" "=Home" && sleep 8 && capture "home" || true
          find_and_tap "queue tab" "=Warteschlange" "=Queue" && capture "queue" || true'''
          new = '''if find_and_tap "library tab" "=Bibliothek" "=Library"; then
              capture "library"
              if find_and_tap "liked library entry" "=Liked" "=Gefällt mir"; then
                  sleep 4
                  capture "library-detail"
                  adb shell input keyevent KEYCODE_BACK || true
                  sleep 3
                  capture "library-return"
              fi
          fi

          if find_and_tap "search tab" "=Suche" "=Search"; then
              capture "search"
              find_and_tap "search field" "Search YouTube Music" "YouTube Music durchsuchen" "Search library" "Bibliothek durchsuchen" || true
              adb shell input text "rock"
              adb shell input keyevent KEYCODE_ENTER
              sleep 12
              capture "search-results"
              adb shell input keyevent KEYCODE_BACK || true
              sleep 3
              capture "search-return"
          fi

          find_and_tap "history tab" "=Hörverlauf" "=History" && capture "history" || true
          find_and_tap "home tab" "=Startseite" "=Home" && sleep 8 && capture "home" || true
          find_and_tap "queue tab" "=Warteschlange" "=Queue" && capture "queue" || true'''
          if old not in text:
              raise SystemExit("Expected five-tab smoke-test block was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          rm .github/workflows/extend-dudu7-navigation-test.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Test Dudu7 right-pane detail navigation"
          git push
