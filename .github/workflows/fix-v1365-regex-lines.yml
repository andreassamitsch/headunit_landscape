name: Fix WebRadio 13.6.5 regex lines directly

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1365-regex-lines.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Correct exact generated source lines
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.assistant/patch_webradio_reliability_logos_cover.py')
          lines = path.read_text(encoding='utf-8').splitlines()
          resolver_fixed = False
          initials_fixed = False
          for index, line in enumerate(lines):
              if 'private fun parseDeclaredSize' in line:
                  for j in range(index, min(index + 12, len(lines))):
                      if '?.split(Regex(' in lines[j]:
                          # Python source must contain two backslashes so the raw
                          # Kotlin block emits Regex("\\s+").
                          lines[j] = '            ?.split(Regex("\\\\s+"))'
                          resolver_fixed = True
                          break
              if 'remember(station.name)' in line:
                  for j in range(index, min(index + 14, len(lines))):
                      if '.split(Regex(' in lines[j]:
                          lines[j] = "                        .split(' ')"
                          initials_fixed = True
                          break
          if not resolver_fixed or not initials_fixed:
              raise SystemExit(f'Line correction incomplete: resolver={resolver_fixed}, initials={initials_fixed}')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_reliability_logos_cover.py
          git commit -m 'Fix generated WebRadio regex lines directly'
          git pull --rebase origin main
          git push
