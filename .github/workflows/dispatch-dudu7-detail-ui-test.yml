name: Dispatch Dudu7 Detail UI Test

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/dispatch-dudu7-detail-ui-test.yml"

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Dispatch UI smoke test
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dudu7-ui-test.yml --ref main

      - name: Remove one-time dispatcher
        run: |
          rm .github/workflows/dispatch-dudu7-detail-ui-test.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Dudu7 UI test dispatcher [skip ci]"
          git push
