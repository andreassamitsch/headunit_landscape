name: PR Quick Check

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "build-logic/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "*.gradle.kts"
      - "gradle.properties"
      - "scripts/verify_dudu7_architecture.py"
      - ".github/workflows/build_pr.yml"

permissions:
  contents: read

concurrency:
  group: pr-quick-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dudu7:
    name: Dudu7 compile and unit tests
    if: github.head_ref != 'agent/upstream-13.6.1-bootstrap-final' && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true
          cache-cleanup: on-success

      - name: Prepare
        run: |
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py
          keytool -genkeypair -v \
            -keystore app/pr-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist PR ${{ github.event.number }},O=Metrolist,C=AT"

      - name: Compile Dudu7 and run unit tests
        run: |
          ./gradlew --console=plain \
            assembleGmsDudu7Debug \
            testGmsDudu7DebugUnitTest \
            --warning-mode summary
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          METROLIST_APPLICATION_ID: com.metrolist.music.pr.p${{ github.event.number }}
          METROLIST_APP_NAME: Metrolist PR ${{ github.event.number }}
          METROLIST_DEBUG_KEYSTORE_PATH: pr-debug.keystore
          PULL_REQUEST: "true"
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
