name: Diagnose WebRadio artist action

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-v1367-artist-action.yml'

permissions:
  contents: read

concurrency:
  group: diagnose-v1367-artist-action
  cancel-in-progress: true

jobs:
  patch-diagnostic:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify complete WebRadio patch application
        id: patch
        continue-on-error: true
        run: |
          mkdir -p patch-diagnostic
          set +e
          python3 .assistant/patch_webradio_v1367.py > patch-diagnostic/main-patch.log 2>&1
          main_rc=$?
          python3 .assistant/normalize_webradio_v1367_artist_source.py > patch-diagnostic/normalizer.log 2>&1
          normalizer_rc=$?
          python3 .assistant/harden_webradio_v1367_validation.py > patch-diagnostic/hardener.log 2>&1
          hardener_rc=$?
          cp app/src/main/kotlin/com/metrolist/music/ui/screens/artist/ArtistScreen.kt patch-diagnostic/ArtistScreen.after-hardener.kt || true
          cp scripts/dudu7_webradio_reliability_smoke.sh patch-diagnostic/smoke.after-hardener.sh || true
          printf 'main_rc=%s\nnormalizer_rc=%s\nhardener_rc=%s\n' "$main_rc" "$normalizer_rc" "$hardener_rc" | tee patch-diagnostic/status.txt
          test "$main_rc" -eq 0 && test "$normalizer_rc" -eq 0 && test "$hardener_rc" -eq 0

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WebRadio-patch-diagnostic-${{ github.run_id }}
          path: patch-diagnostic/
          if-no-files-found: error
          retention-days: 3

      - name: Fail when patch failed
        if: steps.patch.outcome == 'failure'
        run: exit 1

