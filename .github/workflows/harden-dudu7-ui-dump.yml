name: Harden Dudu7 UI Dump

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/harden-dudu7-ui-dump.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Add UI dump timeouts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/dudu7_ui_smoke.sh')
          text = path.read_text(encoding='utf-8')
          old = 'adb shell uiautomator dump /sdcard/window.xml >/dev/null 2>&1'
          new = 'timeout 15s adb shell uiautomator dump /sdcard/window.xml >/dev/null 2>&1'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'Expected 2 UI dump calls, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/harden-dudu7-ui-dump.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bound Dudu7 UI hierarchy capture time"
          git push
