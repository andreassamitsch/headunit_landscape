name: Fix Dudu7 Compile Diagnostic

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fix-dudu7-build-diagnostic.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Apply diagnostic fixes
        shell: bash
        run: |
          sed -i '/import androidx.compose.foundation.layout.weight/d' \
            app/src/dudu7/kotlin/com/metrolist/music/variant/VehiclePlayerControls.kt

          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/build.yml')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'tail -n 300 dudu7-build.log > .build-metadata/latest-dudu7-build.log',
              'tail -n 300 dudu7-build.log > .build-metadata/latest-dudu7-build.txt',
          )
          text = text.replace(
              'git add .build-metadata/latest-dudu7-build.log .build-metadata/latest-dudu7-result.json',
              'git add .build-metadata/latest-dudu7-build.txt .build-metadata/latest-dudu7-result.json',
          )
          path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/fix-dudu7-build-diagnostic.yml
          git diff --check

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Dudu7 compile diagnostic"
          git push
