name: Apply Dudu7 history and queue return fix v2

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-dudu7-history-return-fix-v2.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply patch
        run: |
          python3 scripts/apply_dudu7_history_return_fix.py
          python3 scripts/verify_dudu7_architecture.py

      - name: Commit implementation
        run: |
          rm -f scripts/apply_dudu7_history_return_fix.py
          rm -f .github/workflows/apply-dudu7-history-return-fix-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix live listening history and return to Dudu7 queue"
          git push
