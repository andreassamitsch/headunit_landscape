name: Export source for WebRadio analysis

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/export-source-analysis.yml"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Create source snapshot
        run: |
          tar -czf metrolist-source-analysis.tar.gz \
            app/src app/build.gradle.kts gradle/libs.versions.toml \
            scripts .github/workflows/build.yml .github/workflows/dudu7-ui-test.yml \
            docs || true
      - uses: actions/upload-artifact@v6
        with:
          name: metrolist-source-analysis
          path: metrolist-source-analysis.tar.gz
          retention-days: 1
      - name: Record run id
        run: |
          mkdir -p .build-metadata
          printf '{"run_id":%s,"source_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_SHA" > .build-metadata/source-analysis-run.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-metadata/source-analysis-run.json
          git commit -m "Record source analysis run $GITHUB_RUN_ID [skip ci]"
          git push
