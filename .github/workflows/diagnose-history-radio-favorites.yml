name: Diagnose history and radio favorites

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-history-radio-favorites.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
      - name: Collect relevant source excerpts
        run: |
          set -euo pipefail
          mkdir -p _assistant
          {
            echo '=== FILES ==='
            find app/src -type f \( -iname '*history*' -o -iname '*radio*' -o -iname '*station*' \) | sort
            echo
            echo '=== HISTORY SOURCE REFERENCES ==='
            grep -RIn --include='*.kt' -E 'HistorySource|historySource|local_history|remote_history' app/src/main app/src/dudu7 2>/dev/null || true
            echo
            echo '=== RADIO FAVORITE/SAVED/PLAY REFERENCES ==='
            grep -RIn --include='*.kt' -E 'favorite|favourite|savedStations|savedStation|playStation|RadioStation|WebRadio|radioStation|startStation|StationQueue' app/src/main app/src/dudu7 2>/dev/null || true
            echo
            echo '=== RADIO SCREEN CLICK REFERENCES ==='
            grep -RIn --include='*.kt' -E 'combinedClickable|clickable|onClick|playQueue' app/src/main app/src/dudu7 2>/dev/null | grep -Ei 'radio|station|favorite|saved' || true
          } > _assistant/history_radio_diagnosis.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/history_radio_diagnosis.txt
          git commit -m 'Record history and radio favorites diagnosis [skip ci]'
          git push
