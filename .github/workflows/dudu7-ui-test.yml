name: Dudu7 UI Smoke Test

# Run manually for Dudu7 UI, navigation and player interaction changes.
on:
  workflow_dispatch:
    inputs:
      width:
        description: Emulated Dudu7 display width
        required: true
        default: "1280"
      height:
        description: Emulated Dudu7 display height
        required: true
        default: "720"
      density:
        description: Emulated display density (dpi)
        required: true
        default: "200"
      api_level:
        description: Android emulator API level (Dudu7 uses Android 13)
        required: true
        default: "33"
      test_url:
        description: YouTube Music URL opened during the smoke test
        required: false
        default: "https://music.youtube.com/watch?v=dQw4w9WgXcQ"

permissions:
  contents: read

concurrency:
  group: manual-dudu7-ui-smoke-test
  cancel-in-progress: true

jobs:
  ui-test:
    name: Emulate and inspect Dudu7 UI
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      API_LEVEL: ${{ inputs.api_level || '33' }}
      SYSTEM_TARGET: google_apis
      DATA_PARTITION_SIZE: 1536M
      DUDU_WIDTH: ${{ inputs.width || '1280' }}
      DUDU_HEIGHT: ${{ inputs.height || '720' }}
      DUDU_DENSITY: ${{ inputs.density || '200' }}
      TEST_URL: ${{ inputs.test_url || 'https://music.youtube.com/watch?v=dQw4w9WgXcQ' }}
      PACKAGE_NAME: com.metrolist.music.dudu7
      ACTIVITY_NAME: com.metrolist.music.MainActivity
      RESULTS_DIR: ui-test-results
      APK_PATH: dist/Metrolist-Dudu7-emulator.apk

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Prepare x86_64 emulator build
        shell: bash
        run: |
          chmod +x gradlew scripts/dudu7_ui_smoke.sh scripts/run_dudu7_emulator_ci.sh
          python3 scripts/verify_dudu7_architecture.py
          keytool -genkeypair -v \
            -keystore app/nightly-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist Dudu7 UI Test,O=Metrolist,C=AT"

          # The production Dudu7 APK remains ARM-only. Only this temporary
          # emulator build receives x86_64 native libraries.
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")
          original = 'abiFilters += listOf("arm64-v8a", "armeabi-v7a")'
          replacement = 'abiFilters += listOf("x86_64")'
          if original not in text:
              raise SystemExit("Expected ARM abiFilters declaration was not found")
          path.write_text(text.replace(original, replacement, 1), encoding="utf-8")
          PY

      - name: Build emulator APK
        shell: bash
        run: |
          ./gradlew --console=plain assembleGmsDudu7Debug --warning-mode summary
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" "$APK_PATH"
          unzip -l "$APK_PATH" | grep 'lib/x86_64/'
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Dudu7 UI Test
          METROLIST_DEBUG_KEYSTORE_PATH: nightly-debug.keystore
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Free disk space for Android
        shell: bash
        run: |
          ./gradlew --stop || true
          find . -type d -name build -prune -exec rm -rf {} +
          rm -rf "$HOME/.gradle/caches/transforms-"* || true
          df -h
          test -f "$APK_PATH"

      - name: Enable KVM access
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android and run Dudu7 smoke test
        shell: bash
        run: scripts/run_dudu7_emulator_ci.sh

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          if [[ -f ui-test-results/summary.md ]]; then
            cat ui-test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Dudu7 UI test did not produce an app summary." >> "$GITHUB_STEP_SUMMARY"
            if [[ -f ui-test-results/emulator.log ]]; then
              echo '```text' >> "$GITHUB_STEP_SUMMARY"
              tail -n 80 ui-test-results/emulator.log >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload screenshots, video and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-ui-test-${{ github.run_id }}
          path: ui-test-results/
          if-no-files-found: error
          retention-days: 7
