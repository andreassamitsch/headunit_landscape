name: Fix WebRadio 13.6.7 artist actions and test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1367-artist-actions-test.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extend the 13.6.7 patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.assistant/patch_webradio_v1367.py')
          text = path.read_text(encoding='utf-8')

          artist_marker = '# Radio always shows artwork instead of an empty lyrics view.\n'
          artist_patch = r'''# Embedded artist playback actions explicitly return to the vehicle queue.
# This complements the generic selection callback and makes the page fully
# functional even if the player connection is recreated while the artist page
# is on the right-pane back stack.
replace_once(
    artist_screen,
    ''' + "'''" + r'''                                                    playerConnection.playQueue(YouTubeQueue(radioEndpoint))
                                                },''' + "'''" + r''',
    ''' + "'''" + r'''                                                    playerConnection.playQueue(YouTubeQueue(radioEndpoint))
                                                    if (embeddedInPlayer) {
                                                        navController.popBackStack("vehicle_queue", inclusive = false)
                                                    }
                                                },''' + "'''" + r''',
)
replace_once(
    artist_screen,
    ''' + "'''" + r'''                                                        playerConnection.playQueue(YouTubeQueue(shuffleEndpoint))
                                                    },''' + "'''" + r''',
    ''' + "'''" + r'''                                                        playerConnection.playQueue(YouTubeQueue(shuffleEndpoint))
                                                        if (embeddedInPlayer) {
                                                            navController.popBackStack("vehicle_queue", inclusive = false)
                                                        }
                                                    },''' + "'''" + r''',
)

'''
          if artist_marker not in text:
              raise SystemExit('Artist action insertion marker not found')
          if 'navController.popBackStack("vehicle_queue", inclusive = false)' not in text:
              text = text.replace(artist_marker, artist_patch + artist_marker, 1)

          test_marker = '# UI regression test -----------------------------------------------------------\n'
          selected_patch = r'''# Verify the selected tab semantically instead of merely finding its always
# visible title in the scrollable tab row.
replace_once(
    test,
    ''' + "'''" + r'''}

assert_absent_right() {''' + "'''" + r''',
    ''' + "'''" + r'''}

assert_selected_tab() {
    local label="$1"; shift
    dump_ui || return 1
    if python3 - "$RESULTS_DIR/current-window.xml" "$@" <<'PY'
import sys, xml.etree.ElementTree as ET
path, *needles = sys.argv[1:]
needles = [n.casefold() for n in needles]
root = ET.parse(path).getroot()
parent = {child: node for node in root.iter() for child in node}
for node in root.iter('node'):
    values = [node.attrib.get('text','').strip(), node.attrib.get('content-desc','').strip()]
    hay = ' '.join(v for v in values if v).casefold()
    if not hay or not any(n in hay for n in needles):
        continue
    cur = node
    while cur is not None:
        if cur.attrib.get('selected') == 'true':
            raise SystemExit(0)
        cur = parent.get(cur)
raise SystemExit(1)
PY
    then
        echo "PASS: $label"
    else
        echo "FAIL: $label" >&2
        capture "selected-tab-failure"
        return 1
    fi
}

assert_absent_right() {''' + "'''" + r''',
)

'''
          # The selected helper must be inserted after test is assigned, not
          # before it. Place its replace_once call immediately after that line.
          assignment = 'test = "scripts/dudu7_webradio_reliability_smoke.sh"\n'
          if assignment not in text:
              raise SystemExit('Test assignment marker not found')
          if 'assert_selected_tab()' not in text:
              text = text.replace(assignment, assignment + selected_patch, 1)

          replacements = {
              'assert_text "WebRadio tab remains open after favorite start" 1 "=Gespeichert"':
                  'assert_selected_tab "WebRadio tab remains selected after favorite start" "WebRadio"',
              'assert_text "WebRadio tab remains open after second favorite" 1 "=Gespeichert"':
                  'assert_selected_tab "WebRadio tab remains selected after second favorite" "WebRadio"',
              'assert_text "artist action opened normal music queue" 1 "Warteschlange" "Queue"':
                  'assert_selected_tab "artist action selected normal music queue" "Warteschlange" "Queue"',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing test assertion in patch: {old}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          python3 -m py_compile .assistant/patch_webradio_v1367.py
          grep -n -C 3 'assert_selected_tab\|vehicle_queue' .assistant/patch_webradio_v1367.py | head -n 120
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_v1367.py
          git commit -m 'Make embedded artist playback actions explicit'
          git pull --rebase origin main
          git push
