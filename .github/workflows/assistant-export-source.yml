name: Assistant source export

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/assistant-export-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Package relevant source
        run: |
          tar -czf assistant-source-export.tar.gz \
            app/src app/build.gradle.kts gradle/libs.versions.toml \
            .github/workflows/dudu7-ui-smoke-test.yml \
            .github/workflows/build-dudu7-apk.yml \
            settings.gradle.kts build.gradle.kts 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: assistant-source-export
          path: assistant-source-export.tar.gz
          retention-days: 1
      - name: Record run
        run: |
          mkdir -p _assistant
          printf '%s\n' "$GITHUB_RUN_ID" > _assistant/source_export_run.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add _assistant/source_export_run.txt
          git commit -m 'Record assistant source export run' || exit 0
          git push
