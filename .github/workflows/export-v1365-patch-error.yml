name: Export WebRadio 13.6.5 patch error

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-v1365-patch-error.yml'

permissions:
  actions: read
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Download and extract failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _assistant /tmp/joblogs
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89131000214/logs" \
            -o /tmp/joblogs.zip
          unzip -q /tmp/joblogs.zip -d /tmp/joblogs || cp /tmp/joblogs.zip /tmp/joblogs/raw.log
          {
            grep -RIn -E 'Missing expected|Missing |Traceback|SystemExit|Error|error:' /tmp/joblogs | tail -n 100 || true
            echo '--- tail ---'
            find /tmp/joblogs -type f -maxdepth 2 -print0 | xargs -0 tail -n 80 || true
          } > _assistant/v1365_patch_error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/v1365_patch_error.txt
          git commit -m 'Record WebRadio 13.6.5 patch failure [skip ci]'
          git push
