name: Record Dudu7 history patch error

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/record-history-patch-error.yml"

permissions:
  actions: read
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .build-metadata
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/88977976172/logs" > /tmp/job.log
          grep -E "Expected one occurrence|Traceback|SystemExit|Error|error" /tmp/job.log | tail -n 60 > .build-metadata/history-patch-error.txt || true
          tail -n 80 /tmp/job.log >> .build-metadata/history-patch-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-metadata/history-patch-error.txt
          git commit -m "Record history patch error [skip ci]"
          git push
