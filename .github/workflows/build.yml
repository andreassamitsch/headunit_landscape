name: Build Maintained Dudu7

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "build-logic/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "*.gradle.kts"
      - "gradle.properties"
      - "scripts/verify_dudu7_architecture.py"
      - ".github/workflows/build.yml"

permissions:
  contents: read

concurrency:
  group: main-maintained-build
  cancel-in-progress: true

jobs:
  validate:
    name: Standard compatibility and Dudu7 validation
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Prepare
        run: |
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py
          keytool -genkeypair -v \
            -keystore app/nightly-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist Dudu7,O=Metrolist,C=AT"

      - name: Build standard compatibility and fully validate Dudu7
        run: |
          ./gradlew --console=plain \
            assembleFossStandardDebug \
            assembleGmsDudu7Debug \
            :app:lintGmsDudu7Debug \
            testGmsDudu7DebugUnitTest \
            --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Dudu7
          METROLIST_DEBUG_KEYSTORE_PATH: nightly-debug.keystore
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Collect Dudu7 APK
        run: |
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" dist/Metrolist-Dudu7.apk

      - uses: actions/upload-artifact@v6
        with:
          name: metrolist-dudu7-apk
          path: dist/Metrolist-Dudu7.apk
          if-no-files-found: error
