name: Build Dudu7 APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "build-logic/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "*.gradle.kts"
      - "gradle.properties"
      - "scripts/verify_dudu7_architecture.py"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: main-dudu7-apk-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Dudu7 APK
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Record build run
        run: |
          mkdir -p .build-metadata
          printf '{"run_id":%s,"run_attempt":%s,"source_sha":"%s"}\n' \
            "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$GITHUB_SHA" \
            > .build-metadata/latest-dudu7-run.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .build-metadata/latest-dudu7-run.json
          git commit -m "Record Dudu7 build run $GITHUB_RUN_ID [skip ci]"
          git push

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Prepare
        run: |
          chmod +x gradlew
          python3 scripts/verify_dudu7_architecture.py
          keytool -genkeypair -v \
            -keystore app/nightly-debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist Dudu7,O=Metrolist,C=AT"

      - name: Build Dudu7 APK
        shell: bash
        run: |
          set +e
          ./gradlew --console=plain assembleGmsDudu7Debug --warning-mode summary 2>&1 | tee dudu7-build.log
          status=${PIPESTATUS[0]}

          mkdir -p .build-metadata
          tail -n 300 dudu7-build.log > .build-metadata/latest-dudu7-build.log
          printf '{"run_id":%s,"status":%s,"source_sha":"%s"}\n' \
            "$GITHUB_RUN_ID" "$status" "$GITHUB_SHA" \
            > .build-metadata/latest-dudu7-result.json

          git add .build-metadata/latest-dudu7-build.log .build-metadata/latest-dudu7-result.json
          git commit -m "Record Dudu7 build result $GITHUB_RUN_ID [skip ci]" || true
          git push
          exit "$status"
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist Dudu7
          METROLIST_DEBUG_KEYSTORE_PATH: nightly-debug.keystore
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Collect Dudu7 APK
        run: |
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" dist/Metrolist-Dudu7.apk

      - uses: actions/upload-artifact@v6
        with:
          name: metrolist-dudu7-apk
          path: dist/Metrolist-Dudu7.apk
          if-no-files-found: error
