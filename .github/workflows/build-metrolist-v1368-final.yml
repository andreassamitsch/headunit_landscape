name: Build and test Metrolist 13.6.8

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-metrolist-v1368-final.yml'

permissions:
  contents: write

concurrency:
  group: metrolist-v1368-final
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 80
    env:
      METROLIST_APP_NAME: Metrolist
      API_LEVEL: '33'
      SYSTEM_TARGET: google_apis
      DATA_PARTITION_SIZE: 1536M
      DUDU_WIDTH: '1280'
      DUDU_HEIGHT: '720'
      DUDU_DENSITY: '200'
      TEST_URL: https://music.youtube.com/watch?v=dQw4w9WgXcQ
      PACKAGE_NAME: com.metrolist.music.dudu7.debug
      ACTIVITY_NAME: com.metrolist.music.MainActivity
      RESULTS_DIR: ui-test-results
      APK_PATH: dist/Metrolist-Dudu7-13.6.8-emulator.apk

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Apply final correction and record run id
        run: |
          set -euo pipefail
          python3 .assistant/finalize_v1368.py
          rm -f .assistant/finalize_v1368.py
          mkdir -p _assistant
          printf 'run_id=%s\njob_status=running\ncommit=%s\n' \
            "$GITHUB_RUN_ID" "$GITHUB_SHA" \
            > _assistant/v1368_final_run.txt
          python3 scripts/verify_dudu7_v1368_features.py
          bash -n scripts/dudu7_webradio_reliability_smoke.sh
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Finalize radio metadata handling and record validation run [skip ci]'
          git pull --rebase origin main
          git push

      - name: Static acceptance checks
        run: |
          set -euxo pipefail
          mkdir -p artifacts "$RESULTS_DIR"
          python3 scripts/verify_dudu7_v1368_features.py | tee artifacts/static-feature-checks.txt
          bash -n scripts/dudu7_webradio_reliability_smoke.sh
          grep -q 'versionCode = 157' app/build.gradle.kts
          grep -q 'versionName = "13.6.8"' app/build.gradle.kts
          chmod +x gradlew scripts/run_dudu7_emulator_ci.sh scripts/dudu7_webradio_reliability_smoke.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Build ARM update APK
        run: |
          set -o pipefail
          ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary 2>&1 | tee artifacts/build-arm.log
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Verify and package ARM APK
        run: |
          set -euxo pipefail
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" artifacts/Metrolist-Dudu7-13.6.8.apk
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/aapt" dump badging artifacts/Metrolist-Dudu7-13.6.8.apk | tee artifacts/apk-badging.txt
          "$build_tools/apksigner" verify --verbose --print-certs artifacts/Metrolist-Dudu7-13.6.8.apk | tee artifacts/apk-signature.txt
          grep -q "package: name='com.metrolist.music.dudu7.debug' versionCode='157'" artifacts/apk-badging.txt
          unzip -l artifacts/Metrolist-Dudu7-13.6.8.apk | grep -E 'lib/(arm64-v8a|armeabi-v7a)/'
          sha256sum artifacts/Metrolist-Dudu7-13.6.8.apk | tee artifacts/SHA256SUMS.txt

      - name: Prepare x86_64 emulator build
        run: |
          set -euxo pipefail
          cp app/build.gradle.kts /tmp/build.gradle.arm.kts
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/build.gradle.kts')
          text = path.read_text(encoding='utf-8')
          old = 'abiFilters += listOf("arm64-v8a", "armeabi-v7a")'
          if old not in text:
              raise SystemExit('Expected ARM ABI declaration not found')
          path.write_text(text.replace(old, 'abiFilters += listOf("x86_64")', 1), encoding='utf-8')
          PY

      - name: Build emulator APK
        run: |
          set -o pipefail
          ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary 2>&1 | tee artifacts/build-x86.log
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" "$APK_PATH"
          unzip -l "$APK_PATH" | grep 'lib/x86_64/'
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Free disk space for emulator
        run: |
          ./gradlew --stop || true
          find . -type d -name build -prune -exec rm -rf {} +
          rm -rf "$HOME/.gradle/caches/transforms-"* || true
          test -f "$APK_PATH"
          df -h

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Dudu7 WebRadio regression test
        run: |
          set -euxo pipefail
          mkdir -p "$RESULTS_DIR" radio-test-data
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=440:duration=4' -c:a libmp3lame -b:a 96k radio-test-data/station1.mp3
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=660:duration=4' -c:a libmp3lame -b:a 96k radio-test-data/station2.mp3
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=880:duration=4' -c:a libmp3lame -b:a 96k radio-test-data/station3.mp3
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'color=c=0x4f46e5:s=512x512' -frames:v 1 radio-test-data/logo3.png
          python3 scripts/icy_test_server.py \
            --audio1 radio-test-data/station1.mp3 \
            --audio2 radio-test-data/station2.mp3 \
            --audio3 radio-test-data/station3.mp3 \
            --logo3 radio-test-data/logo3.png \
            > "$RESULTS_DIR/icy-server.log" 2>&1 &
          echo $! > "$RESULTS_DIR/icy-server.pid"
          for i in {1..20}; do curl -fsS http://127.0.0.1:8000/health && break; sleep 1; done
          curl -fsS http://127.0.0.1:8000/health
          cp scripts/dudu7_webradio_reliability_smoke.sh scripts/dudu7_ui_smoke.sh
          chmod +x scripts/dudu7_ui_smoke.sh
          scripts/run_dudu7_emulator_ci.sh

      - name: Upload APK and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Dudu7-13.6.8-${{ github.run_id }}
          path: |
            artifacts/
            ui-test-results/
          if-no-files-found: warn
          retention-days: 14

# final-validation-5
