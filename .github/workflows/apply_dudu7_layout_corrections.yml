name: Apply Dudu7 Layout Corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'agent/dudu7-layout-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/dudu7-layout-corrections
          fetch-depth: 0
      - name: Apply focused source corrections
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 scripts/apply_dudu7_layout_corrections.py >/tmp/dudu7-patch.log 2>&1
          status=$?
          cat /tmp/dudu7-patch.log
          exit $status
      - name: Upload patch diagnostics
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-patch-diagnostics
          path: /tmp/dudu7-patch.log
          if-no-files-found: error
      - name: Commit corrected source
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_dudu7_layout_corrections.py
          rm -f .github/workflows/apply_dudu7_layout_corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Apply Dudu7 visual corrections"
          git push origin HEAD:agent/dudu7-layout-corrections
      - name: Fail when patching failed
        if: steps.patch.outcome == 'failure'
        run: exit 1
