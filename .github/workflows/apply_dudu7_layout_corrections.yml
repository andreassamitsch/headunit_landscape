name: Apply Dudu7 Layout Corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'agent/dudu7-layout-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/dudu7-layout-corrections
          fetch-depth: 0
      - name: Apply focused source corrections
        shell: bash
        run: |
          set -euo pipefail
          if ! python3 scripts/apply_dudu7_layout_corrections.py >/tmp/dudu7-patch.log 2>&1; then
            cat /tmp/dudu7-patch.log
            exit 1
          fi
          cat /tmp/dudu7-patch.log
      - name: Commit corrected source
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_dudu7_layout_corrections.py
          rm -f .github/workflows/apply_dudu7_layout_corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Apply Dudu7 visual corrections"
          git push origin HEAD:agent/dudu7-layout-corrections
