name: Apply Dudu7 Layout Corrections

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'agent/dudu7-layout-corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/dudu7-layout-corrections
          fetch-depth: 0
      - name: Apply focused source corrections
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_dudu7_layout_corrections.py')
          text = path.read_text(encoding='utf-8')

          old_visibility = '''replace_once(
              "app/src/main/kotlin/com/metrolist/music/ui/player/Player.kt",
              "            visible = !isFullScreen,\\n",
              "            visible = !isFullScreen && !VehicleVariantConfig.isDudu7,\\n",
          )'''
          new_visibility = '''player_path = "app/src/main/kotlin/com/metrolist/music/ui/player/Player.kt"
          player_text = read(player_path)
          player_anchor = "            visible = !isFullScreen,\\n"
          player_index = player_text.rfind(player_anchor)
          if player_index < 0:
              raise RuntimeError("Missing final queue visibility anchor")
          write(player_path, player_text[:player_index] + "            visible = !isFullScreen && !VehicleVariantConfig.isDudu7,\\n" + player_text[player_index + len(player_anchor):])'''
          if text.count(old_visibility) != 1:
              raise SystemExit(f'current script visibility anchor count: {text.count(old_visibility)}')
          text = text.replace(old_visibility, new_visibility, 1)

          old_docs = '''replace_once(
              docs,
              "- Player links, Warteschlange rechts\\n",
              "- Player links, Warteschlange rechts\\n- feste rechte Queue ohne zusätzliches Smartphone-Bottom-Sheet\\n- kompakter RVX-Player mit großem Cover und reiner Icon-Aktionsleiste\\n",
          )'''
          new_docs = '''replace_once(
              docs,
              "- RVX-inspirierter Player links, permanente Warteschlange rechts\\n",
              "- RVX-inspirierter Player links, permanente Warteschlange rechts\\n- feste rechte Queue ohne zusätzliches Smartphone-Bottom-Sheet\\n- kompakter RVX-Player mit großem Cover und reiner Icon-Aktionsleiste\\n",
          )'''
          if text.count(old_docs) < 1:
              raise SystemExit(f'current script docs anchor count: {text.count(old_docs)}')
          text = text.replace(old_docs, new_docs, 1)

          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/apply_dudu7_layout_corrections.py >/tmp/dudu7-patch.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/dudu7_overlay/rebuild_05_layout_corrections.py.part')
          text = path.read_text(encoding='utf-8')
          old = '''    replace_once(
                  player,
                  "            visible = !isFullScreen,\\n",
                  "            visible = !isFullScreen && !VehicleVariantConfig.isDudu7,\\n",
              )'''
          new = '''    player_text = read(player)
              player_anchor = "            visible = !isFullScreen,\\n"
              player_index = player_text.rfind(player_anchor)
              if player_index < 0:
                  raise RuntimeError("Missing final queue visibility anchor")
              write(player, player_text[:player_index] + "            visible = !isFullScreen && !VehicleVariantConfig.isDudu7,\\n" + player_text[player_index + len(player_anchor):])'''
          if text.count(old) != 1:
              raise SystemExit(f'overlay visibility anchor count: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          fi
          cat /tmp/dudu7-patch.log
          exit $status
      - name: Upload patch diagnostics
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: dudu7-patch-diagnostics
          path: /tmp/dudu7-patch.log
          if-no-files-found: error
      - name: Commit corrected source
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_dudu7_layout_corrections.py
          rm -f .github/workflows/apply_dudu7_layout_corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Apply Dudu7 visual corrections"
          git push origin HEAD:agent/dudu7-layout-corrections
      - name: Fail when patching failed
        if: steps.patch.outcome == 'failure'
        run: exit 1
