name: Export WebRadio 13.6.7 patch error

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-v1367-patch-error.yml'

permissions:
  actions: read
  contents: write

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Export exact patch error
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p _assistant
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89203769429/logs" \
            -o /tmp/log
          {
            grep -n -E 'Missing expected text|SystemExit|Traceback|Error|error' /tmp/log | tail -n 80 || true
            echo '--- tail ---'
            tail -n 80 /tmp/log
          } > _assistant/v1367_patch_error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f _assistant/v1367_patch_error.txt
          git commit -m 'Record WebRadio 13.6.7 patch error [skip ci]'
          git push
