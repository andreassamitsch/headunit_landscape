name: Inspect Upstream Materialization Runs

on:
  pull_request:
    branches: ["main"]

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect materialization runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GH_REPO/actions/workflows/materialize_upstream_dudu7.yml/runs?branch=agent/upstream-13.6.1-bootstrap&per_page=10" > materialize-runs.json
          jq '.workflow_runs[] | {id,status,conclusion,head_sha,event,created_at,updated_at}' materialize-runs.json | tee materialize-summary.txt
          RUN_ID="$(jq -r '.workflow_runs[0].id' materialize-runs.json)"
          HEAD_SHA="$(jq -r '.workflow_runs[0].head_sha' materialize-runs.json)"
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID" > materialize-run-detail.json
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/jobs" > materialize-jobs.json
          gh api -H "Accept: application/vnd.github+json" "repos/$GH_REPO/commits/$HEAD_SHA/check-runs" > materialize-check-runs.json
          jq '{id,status,conclusion,event,path,display_title,run_started_at,updated_at}' materialize-run-detail.json | tee materialize-detail-summary.txt
          jq '.check_runs[] | {name,status,conclusion,details_url,output}' materialize-check-runs.json | tee materialize-check-summary.txt
      - uses: actions/upload-artifact@v6
        with:
          name: materialize-run-inspection
          path: |
            materialize-runs.json
            materialize-summary.txt
            materialize-run-detail.json
            materialize-jobs.json
            materialize-check-runs.json
            materialize-detail-summary.txt
            materialize-check-summary.txt
          if-no-files-found: error
