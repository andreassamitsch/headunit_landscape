name: Inspect Upstream Materialization Runs

on:
  pull_request:
    branches: ["main"]

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect failed materialization run
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="29814664764"
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID" > materialize-run-detail.json
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/jobs" > materialize-jobs.json
          JOB_ID="$(jq -r '.jobs[0].id' materialize-jobs.json)"
          gh api "repos/$GH_REPO/actions/jobs/$JOB_ID/logs" > materialize-job.log
          tail -n 400 materialize-job.log > materialize-job-tail.txt
          cat materialize-job-tail.txt
      - uses: actions/upload-artifact@v6
        with:
          name: materialize-run-inspection
          path: |
            materialize-run-detail.json
            materialize-jobs.json
            materialize-job-tail.txt
          if-no-files-found: error
