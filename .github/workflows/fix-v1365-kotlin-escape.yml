name: Fix WebRadio 13.6.5 Kotlin escape

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v1365-kotlin-escape.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Correct generated Kotlin regex escape
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.assistant/patch_webradio_reliability_logos_cover.py')
          text = path.read_text(encoding='utf-8')
          old = '.split(Regex("\\\\s+"))'
          new = '.split(Regex("\\\\\\\\s+"))'
          if old not in text:
              raise SystemExit('Expected initials regex in patch script not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .assistant/patch_webradio_reliability_logos_cover.py
          git commit -m 'Fix generated WebRadio initials regex escape'
          git pull --rebase origin main
          git push
