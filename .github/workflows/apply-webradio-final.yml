name: Apply WebRadio final

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-webradio-final.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-webradio-final
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    env:
      METROLIST_APP_NAME: Metrolist
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Record workflow run
        run: |
          mkdir -p _assistant
          printf '%s\n' "$GITHUB_RUN_ID" > _assistant/webradio_build_run.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add _assistant/webradio_build_run.txt
          git commit -m 'Record WebRadio build run' || true
          git push

      - name: Apply prepared source patch
        run: |
          base64 -d .assistant/webradio-existing.patch.xz.b64 | xz -d > /tmp/webradio.patch
          patch --batch --forward -p1 < /tmp/webradio.patch
          sed -i '/import androidx.compose.foundation.layout.weight/d' app/src/main/kotlin/com/metrolist/music/ui/screens/HistoryScreen.kt
          base64 -d .assistant/persistent-debug.keystore.b64 > app/persistent-debug.keystore
          chmod 600 app/persistent-debug.keystore

      - name: Verify intended architecture
        run: |
          set -euxo pipefail
          test -s metroproto/listentogether.proto
          grep -q 'WEBRADIO("WebRadio"' app/src/dudu7/kotlin/com/metrolist/music/variant/VehicleLandscapeLayout.kt
          grep -q 'WebRadioScreen()' app/src/dudu7/kotlin/com/metrolist/music/variant/VehicleLandscapeLayout.kt
          grep -q 'isRadioMediaId(mediaItem.mediaId)) return' app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt
          grep -q 'Icy-MetaData' app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt
          grep -q 'if (!embeddedInPlayer)' app/src/main/kotlin/com/metrolist/music/ui/screens/HistoryScreen.kt
          grep -q 'local_history' app/src/main/kotlin/com/metrolist/music/ui/screens/HistoryScreen.kt
          grep -q 'remote_history' app/src/main/kotlin/com/metrolist/music/ui/screens/HistoryScreen.kt
          ! grep -q 'activeHistoryMonitorJob' app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt
          test -s app/persistent-debug.keystore
          keytool -list -keystore app/persistent-debug.keystore -storepass android -alias androiddebugkey >/dev/null

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Dudu7 APK
        id: gradle_build
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          ./gradlew :app:assembleGmsDudu7Debug --stacktrace --no-daemon 2>&1 | tee build-webradio.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webradio-build-log-${{ github.run_id }}
          path: build-webradio.log
          retention-days: 3

      - name: Fail on Gradle error
        if: steps.gradle_build.outputs.status != '0'
        run: exit 1

      - name: Collect and inspect APK
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          apk="$(find app/build/outputs/apk -type f -name '*.apk' | grep -i dudu7 | head -n 1)"
          test -n "$apk"
          cp "$apk" artifacts/Metrolist-Dudu7-WebRadio.apk
          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/aapt" dump badging artifacts/Metrolist-Dudu7-WebRadio.apk | tee artifacts/apk-badging.txt
          "$build_tools/apksigner" verify --verbose --print-certs artifacts/Metrolist-Dudu7-WebRadio.apk | tee artifacts/apk-signature.txt
          grep -q "package: name='com.metrolist.music.dudu7.debug' versionCode='151'" artifacts/apk-badging.txt
          sha256sum artifacts/Metrolist-Dudu7-WebRadio.apk | tee artifacts/SHA256SUMS.txt

      - name: Commit successful implementation
        run: |
          set -euxo pipefail
          git add \
            app/build.gradle.kts \
            app/src/main/kotlin/com/metrolist/music/playback/MusicService.kt \
            app/src/main/kotlin/com/metrolist/music/playback/PlayerConnection.kt \
            app/src/main/kotlin/com/metrolist/music/ui/player/Player.kt \
            app/src/main/kotlin/com/metrolist/music/ui/screens/HistoryScreen.kt \
            app/src/dudu7/kotlin/com/metrolist/music/variant/VehicleLandscapeLayout.kt \
            app/src/dudu7/kotlin/com/metrolist/music/variant/VehiclePlayerControls.kt
          git add -f app/persistent-debug.keystore
          git rm -f \
            .assistant/webradio-existing.patch.xz.b64 \
            .assistant/persistent-debug.keystore.b64 \
            .github/workflows/apply-webradio-final.yml \
            .github/workflows/assistant-export-source.yml \
            _assistant/source_export_run.txt || true
          git commit -m 'Add integrated Dudu7 WebRadio and restore original history'
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist-Dudu7-WebRadio-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
