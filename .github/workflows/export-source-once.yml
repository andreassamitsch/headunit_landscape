name: Export source snapshot once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-source-once.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Pack repository source
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='**/build' \
            --exclude='.gradle' \
            --exclude='headunit-landscape-source.tar.gz' \
            -czf /tmp/headunit-landscape-source.tar.gz .
          mv /tmp/headunit-landscape-source.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: headunit-landscape-source-${{ github.run_id }}
          path: headunit-landscape-source.tar.gz
          if-no-files-found: error
          retention-days: 2
