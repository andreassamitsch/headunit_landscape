# Validation run for WebRadio 13.6.3
name: Dudu7 WebRadio UI Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dudu7-webradio-ui-test.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dudu7-webradio-ui-test
  cancel-in-progress: true

jobs:
  ui-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 50
    env:
      API_LEVEL: '33'
      SYSTEM_TARGET: google_apis
      DATA_PARTITION_SIZE: 1536M
      DUDU_WIDTH: '1280'
      DUDU_HEIGHT: '720'
      DUDU_DENSITY: '200'
      TEST_URL: https://music.youtube.com/watch?v=dQw4w9WgXcQ
      PACKAGE_NAME: com.metrolist.music.dudu7.debug
      ACTIVITY_NAME: com.metrolist.music.MainActivity
      RESULTS_DIR: ui-test-results
      APK_PATH: dist/Metrolist-Dudu7-WebRadio-emulator.apk
      METROLIST_APP_NAME: Metrolist

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Record UI test run
        run: |
          mkdir -p _assistant
          printf '%s\n' "$GITHUB_RUN_ID" > _assistant/webradio_ui_run.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add _assistant/webradio_ui_run.txt
          git commit -m "Record WebRadio UI run $GITHUB_RUN_ID [skip ci]" || true
          git push || true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Prepare x86_64 emulator build
        run: |
          chmod +x gradlew scripts/run_dudu7_emulator_ci.sh scripts/dudu7_webradio_smoke.sh
          python3 - <<'PY'
          from pathlib import Path
          path=Path('app/build.gradle.kts')
          text=path.read_text(encoding='utf-8')
          old='abiFilters += listOf("arm64-v8a", "armeabi-v7a")'
          if old not in text:
              raise SystemExit('Expected ARM ABI declaration not found')
          path.write_text(text.replace(old,'abiFilters += listOf("x86_64")',1),encoding='utf-8')
          PY

      - name: Build emulator APK
        run: |
          ./gradlew --console=plain :app:assembleGmsDudu7Debug --warning-mode summary
          mkdir -p dist
          APK="$(find app/build/outputs/apk -type f -name '*.apk' | grep '/gmsDudu7/debug/' | head -n 1)"
          test -n "$APK"
          cp "$APK" "$APK_PATH"
          unzip -l "$APK_PATH" | grep 'lib/x86_64/'
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Free disk space for Android
        run: |
          ./gradlew --stop || true
          find . -type d -name build -prune -exec rm -rf {} +
          rm -rf "$HOME/.gradle/caches/transforms-"* || true
          df -h
          test -f "$APK_PATH"

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run deterministic radio and history test
        run: |
          mkdir -p "$RESULTS_DIR" radio-test-data
          printf 'test started\n' > "$RESULTS_DIR/test-marker.txt"
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=440:duration=4' -c:a libmp3lame -b:a 96k radio-test-data/station1.mp3
          ffmpeg -hide_banner -loglevel error -f lavfi -i 'sine=frequency=660:duration=4' -c:a libmp3lame -b:a 96k radio-test-data/station2.mp3
          python3 scripts/icy_test_server.py \
            --audio1 radio-test-data/station1.mp3 \
            --audio2 radio-test-data/station2.mp3 \
            > "$RESULTS_DIR/icy-server.log" 2>&1 &
          echo $! > "$RESULTS_DIR/icy-server.pid"
          for i in {1..20}; do curl -fsS http://127.0.0.1:8000/health && break; sleep 1; done
          curl -fsS http://127.0.0.1:8000/health
          cp scripts/dudu7_webradio_smoke.sh scripts/dudu7_ui_smoke.sh
          chmod +x scripts/dudu7_ui_smoke.sh
          scripts/run_dudu7_emulator_ci.sh

      - name: Publish test summary
        if: always()
        run: |
          if [[ -f ui-test-results/summary.md ]]; then
            cat ui-test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'WebRadio UI test did not produce a summary.' >> "$GITHUB_STEP_SUMMARY"
            tail -n 100 ui-test-results/smoke-test.log 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
          fi

      - name: Upload screenshots and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dudu7-webradio-ui-test-${{ github.run_id }}
          path: ui-test-results/
          if-no-files-found: error
          retention-days: 7
